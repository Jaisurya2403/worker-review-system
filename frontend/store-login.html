<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Login - WorkerReview</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="logo-circle">🏪</div>
        <h1 class="auth-title">Store Login</h1>
        <p class="auth-subtitle">Sign in to manage your team reviews</p>
      </div>

      <div id="alert-area"></div>

      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            class="form-control"
            placeholder="Enter your username"
            required
            autocomplete="username"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="login-btn">
          Sign In
        </button>
      </form>

      <p style="text-align:center; margin-top:20px; font-size:0.85rem; color:var(--gray-500);">
        <a href="index.html" style="color:var(--primary);">← Back to Home</a>
      </p>
    </div>
  </div>

  <script>
    const API = 'http://localhost:5001/api';

    // Redirect if already logged in
    if (localStorage.getItem('storeToken')) {
      window.location.href = 'store-dashboard.html';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const alertArea = document.getElementById('alert-area');
      alertArea.innerHTML = '';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        const res = await fetch(`${API}/store/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          let msg = data.message || data.error || 'Login failed.';
          alertArea.innerHTML = `<div class="alert alert-${data.error === 'subscription_expired' ? 'warning' : 'danger'}">${msg}</div>`;
          return;
        }

        localStorage.setItem('storeToken', data.token);
        localStorage.setItem('storeUsername', data.username);
        localStorage.setItem('storeName', data.store_name);
        localStorage.setItem('storeId', data.store_id);
        window.location.href = 'store-dashboard.html';

      } catch (err) {
        alertArea.innerHTML = `<div class="alert alert-danger">Cannot connect to server. Make sure the backend is running.</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Sign In';
      }
    }
  </script>
</body>
</html>
